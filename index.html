<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Upload Box</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f7fb; }
        .upload-container { width: 450px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center; }
        h2 { color: #333; margin-top: 0; font-size: 22px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        #drop-zone { border: 2px dashed #4A90E2; background: #F4F8FF; border-radius: 8px; padding: 40px 20px; cursor: pointer; transition: background 0.3s; }
        #drop-zone:hover { background: #E6F0FA; }
        #drop-zone p { margin: 0; font-weight: 600; color: #4A90E2; font-size: 16px; }
        #file-input { display: none; }
        #progress-container { display: none; margin-top: 25px; text-align: left; }
        .status-text { font-size: 14px; color: #444; font-weight: 500; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .progress-bar-bg { width: 100%; background: #eaeaea; height: 10px; border-radius: 5px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #4CAF50; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div class="upload-container">
    <h2>Dump Here</h2>
    <p>Do not close the window until the upload completes.</p>
    
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
        <p>Drag and drop your files here <br>or <br>click to browse</p>
        <input type="file" id="file-input" multiple>
    </div>

    <div id="progress-container">
        <div class="status-text" id="status-text">Preparing upload...</div>
        <div class="progress-bar-bg">
            <div id="progress-bar"></div>
        </div>
    </div>
</div>

<script>
    // CHANGE THIS TO YOUR ACTUAL API GATEWAY ENDPOINT URL
    const API_ENDPOINT = 'YOUR_API_GATEWAY_URL'; 
    
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const statusText = document.getElementById('status-text');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, e => e.preventDefault(), false);
    });

    dropZone.addEventListener('drop', (e) => {
        const files = e.dataTransfer.files;
        if (files.length > 0) processUploadQueue(files);
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) processUploadQueue(e.target.files);
    });

    async function processUploadQueue(files) {
        progressContainer.style.display = 'block';
        dropZone.style.pointerEvents = 'none';
        dropZone.style.opacity = '0.5';

        for (let i = 0; i < files.length; i++) {
            try {
                await uploadSingleFile(files[i], i + 1, files.length);
            } catch (err) {
                console.error(err);
                statusText.innerText = "❌ Error: " + err.message;
                statusText.style.color = "#f44336";
                return; // Stop queue on failure
            }
        }

        statusText.innerText = "✅ All uploads completed successfully!";
        statusText.style.color = "#4CAF50";
        progressBar.style.width = '100%';
    }

    function uploadSingleFile(file, currentIdx, totalFiles) {
        return new Promise((resolve, reject) => {
            statusText.innerText = `[${currentIdx}/${totalFiles}] Requesting upload token for: ${file.name}`;
            
            fetch(API_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fileName: file.name })
            })
            .then(res => {
                if (!res.ok) throw new Error('API Gateway authorization failed.');
                return res.json();
            })
            .then(data => {
                if (!data.uploadUrl) throw new Error('No uploadUrl returned from Lambda.');
                
                const xhr = new XMLHttpRequest();
                xhr.open('PUT', data.uploadUrl, true);
                
                xhr.upload.onprogress = (event) => {
                    if (event.lengthComputable) {
                        const percent = Math.round((event.loaded / event.total) * 100);
                        progressBar.style.width = percent + '%';
                        statusText.innerText = `Uploading [${currentIdx}/${totalFiles}]: ${file.name} (${percent}%)`;
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 200) resolve();
                    else reject(new Error(`S3 upload rejected with status ${xhr.status}. Check S3 CORS configuration.`));
                };
                
                xhr.onerror = () => reject(new Error('Network error occurred during S3 upload.'));
                xhr.send(file);
            })
            .catch(err => reject(err));
        });
    }
</script>
</body>
</html>
